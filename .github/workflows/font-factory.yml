name: Font Factory
on:
  push:
    paths: ['fonts/**', 'engine/**']
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: set
        run: |
          FONTS=$(find fonts -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$FONTS" >> $GITHUB_OUTPUT

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        font: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y fontforge python3-fontforge
      - run: python3 engine/build_font.py fonts/${{ matrix.font }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.font }}
          path: dist/*.ttf
