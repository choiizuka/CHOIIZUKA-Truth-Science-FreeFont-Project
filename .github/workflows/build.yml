# 抜粋：ファイル名を自動探索する版
- name: Build
  run: |
    fontforge -lang=py -c "
    import glob, fontforge
    mplus = glob.glob('**/mplus*.ttf', recursive=True)[0]
    noto = glob.glob('Noto_Sans_JP/*.*', recursive=True)[0]
    tr = glob.glob('**/TRSans*.ttf', recursive=True)[0]
    print('Found:', mplus, noto, tr)
    jp = fontforge.open(mplus)
    jp.mergeFonts(tr)
    jp.generate('Truth-Science-MPlus.ttf')
    "
