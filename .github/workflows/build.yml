name: Build Truth-Science

on:
  workflow_dispatch:
  push:
    paths:
      - 'M_PLUS_1p/**'
      - 'Noto_Sans_JP/**'
      - 'output/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install FontForge
        run: sudo apt-get update && sudo apt-get install -y fontforge python3-fontforge

      - name: Merge fonts with correct names
        run: |
          mkdir -p dist
          python3 << 'PY'
          import glob, fontforge

          mplus = glob.glob('**/mplus*.ttf', recursive=True)[0]
          noto = glob.glob('Noto_Sans_JP/*', recursive=True)[0]
          tr = glob.glob('**/TRSans*.ttf', recursive=True)[0]

          print('✅ Found:', tr, mplus, noto)

          # TRSansを土台に（英数を守る）
          font = fontforge.open(tr)
          font.mergeFonts(mplus)
          font.mergeFonts(noto)

          # 名前を書き換え
          font.fontname = "TruthScience-MPlus"
          font.familyname = "Truth Science MPlus"
          font.fullname = "Truth Science MPlus Regular"

          font.generate('dist/Truth-Science-MPlus.ttf')
          print('🎉 完成！')
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Truth-Science-Font
          path: dist/*.ttf
