name: Build TR Font Prototype
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y fontforge python3-fontforge python3-pip
      - run: pip install pillow
      - run: python3 build.py
      - run: python3 preview.py
      - uses: actions/upload-artifact@v4
        with:
          name: TR-Font-Prototype
          path: |
            output/TRSans-Regular.ttf
            preview.png
