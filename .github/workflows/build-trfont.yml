name: Build TR Font Prototype

on:
  push:
    paths:
      - 'build.py'
      - 'glyphs.py'
      - 'config.py'
      - 'preview.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install FontForge
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge python3-fontforge

      - name: Install Python deps
        run: |
          pip3 install pillow

      - name: Build font
        run: |
          python3 build.py

      - name: Generate preview
        run: |
          python3 preview.py

      - name: Upload TRSans
        uses: actions/upload-artifact@v4
        with:
          name: TRSans-Prototype-v0.1
          path: |
            output/TRSans-Regular.ttf
            preview.png
