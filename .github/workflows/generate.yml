name: Build glyphs
on:
  workflow_dispatch:
  push:
    paths: ['imagefonts/**']

permissions:
  contents: write # ← これを追加

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pillow

      - name: Run all font generators
        run: |
          for f in $(find imagefonts -name generate.py); do
            echo ">> $f"
            python "$f"
          done

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imagefonts/**/output
          git commit -m "auto build fonts" || echo "no changes"
          git push
